name: hyperfocus_app
description: HyperFocus - ADHD-friendly planner with One Thing Mode.
publish_to: 'none'
version: 1.0.10+10

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  in_app_purchase: ^3.2.1
  audioplayers: ^6.1.0
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  intl: any
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  confetti: ^0.8.0
  flutter_foreground_task: ^8.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/
    - assets/audio/
    - assets/icon/

flutter_native_splash:
  color: "#7C3AED"
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
