name: hyperfocus_app
description: HyperFocus - ADHD-friendly planner with One Thing Mode.
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  google_mobile_ads: ^5.2.0
  in_app_purchase: ^3.2.1
  app_tracking_transparency: ^2.0.6
  audioplayers: ^6.1.0
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  intl: any
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  confetti: ^0.8.0
  flutter_foreground_task: ^8.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/
    - assets/audio/
